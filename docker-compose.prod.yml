# ---------------------------- Production Compose ----------------------------
# Run with: docker compose -f docker-compose.prod.yml up -d --build
#
# Differences from docker-compose.yml (dev):
#   - No bind mounts — images are self-contained, code isn't shared from host
#   - No --reload on backend/taskiq_worker
#   - frontend builds docker/frontend.Dockerfile's `production` target
#     (nginx serving the static Vite build) instead of the Vite dev server
#   - restart: unless-stopped on long-running services, so they recover from
#     crashes/host reboots without manual intervention
#   - deploy.resources.limits on every service, so a leak/runaway process in
#     one container can't starve the host or its siblings. `docker compose`
#     (Compose V2, not Swarm) enforces these directly via the container
#     runtime — no orchestrator required. Values are conservative starting
#     points, not load-tested; tune them against real traffic.
#
# Out of scope (by design — see CLAUDE.md "no unnecessary cloud-specific
# tooling"): this file assumes a reverse proxy / TLS terminator sits in
# front of it in a real deployment (e.g. nginx/Caddy/Traefik on the host,
# or a cloud load balancer) — it does not attempt to provision one.

# Every service uses Docker's default json-file log driver, which has no
# built-in size cap — without one, a busy production stack (this dev
# compose file's own backend even enables --access-log) fills the host's
# disk over weeks/months, and a full disk stops every container from
# writing, not just the noisy one. 10MB x 3 files per service is a small,
# conservative cap; raise it if you need longer local log retention (this
# has no bearing on Bugsink/Sentry-based error monitoring, which is
# separate — see docs/error-monitoring/overview.md).
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:

  postgres:
    image: postgres:15
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # See docker-compose.yml's identical mount — creates the separate
      # "bugsink" database the optional Bugsink service below uses, once,
      # only against a fresh volume.
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G

  redis:
    image: redis:7
    restart: unless-stopped
    # See docker-compose.yml for the REDIS_PASSWORD rationale. Unlike the
    # dev compose file, this one requires it outright (":?" fails the whole
    # `up` with a clear error if unset/empty) rather than silently falling
    # back to an unauthenticated Redis — Redis backs rate limiting, login
    # lockout, and the taskiq broker, so an operator who forgets to set it
    # before a real deployment should find out immediately, not run
    # unauthenticated indefinitely with no signal anything is wrong.
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD must be set for production}"]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"${REDIS_PASSWORD:?REDIS_PASSWORD must be set for production}\" --no-auth-warning ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  # ManifestCV — self-hosted, free, no signup/API key/cloud account needed.
  # No healthcheck: the qdrant/qdrant image ships neither curl nor wget to
  # probe its own HTTP API with, so backend depends on it with the default
  # service_started condition rather than service_healthy.
  qdrant:
    image: qdrant/qdrant
    restart: unless-stopped
    volumes:
      - qdrant_storage:/qdrant/storage
    logging: *default-logging
    # Its in-memory vector index can grow unbounded with knowledge-base
    # ingestion — without a cap, an unexpectedly large index can OOM the
    # host and take down every co-located container with it, not just this
    # one. Same conservative-starting-point caveat as every other limit in
    # this file: tune against real usage, not load-tested.
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    restart: unless-stopped
    env_file:
      - ./.env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      alembic:
        condition: service_completed_successfully   # Don't serve traffic on a schema the migration hasn't applied yet
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/ready')"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      target: production                            # nginx + static build, not the Vite dev server
      # Vite bakes these in at build time — see frontend.Dockerfile's own
      # comment on why they must be passed here rather than read at runtime.
      # Compose interpolates ${VAR} below from root .env (the same file
      # backend/mystic_auth/core/settings.py reads via env_file — it ignores
      # unrecognized keys, so VITE_-prefixed ones being in there too is
      # fine), or from the shell environment if exported there instead
      # (overrides .env — useful for a CI pipeline with no checked-out .env).
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_APP_NAME: ${VITE_APP_NAME}
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN}
        VITE_SENTRY_ENVIRONMENT: ${VITE_SENTRY_ENVIRONMENT}
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  taskiq_worker:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    restart: unless-stopped
    env_file:
      - ./.env
    command: sh -c "taskiq worker mystic_auth.taskiq_tasks.email_tasks:broker"
    environment:
      - REDIS_URL=${REDIS_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      alembic:
        condition: service_completed_successfully
    # Override backend.Dockerfile's inherited HEALTHCHECK, which curls
    # localhost:8000/health/ready — taskiq_worker shares that image but
    # serves no HTTP at all, so the inherited check always fails and
    # reports this container as permanently "unhealthy" even when the
    # worker itself is running fine. This checks the actual worker process
    # via /proc directly — this slim image has neither `pgrep` nor `ps`.
    healthcheck:
      test: ["CMD-SHELL", "for p in /proc/[0-9]*/cmdline; do grep -aq taskiq \"$$p\" 2>/dev/null && exit 0; done; exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M

  # One-shot: runs migrations then exits. No restart policy — restarting it
  # would just re-apply an already-applied migration in a loop.
  alembic:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    env_file:
      - ./.env
    command: alembic upgrade head
    environment:
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    logging: *default-logging

  # Optional, self-hosted error monitoring — see docker-compose.yml's
  # identical service for the full explanation. Same "off unless you
  # explicitly ask for it" behavior in production:
  #   docker compose -f docker-compose.prod.yml --profile monitoring up -d --build
  bugsink:
    image: bugsink/bugsink:2
    restart: unless-stopped
    profiles: ["monitoring"]
    env_file:
      - ./.env
    environment:
      SECRET_KEY: ${BUGSINK_SECRET_KEY}
      CREATE_SUPERUSER: ${BUGSINK_SUPERUSER_EMAIL}:${BUGSINK_SUPERUSER_PASSWORD}
      PORT: "8000"
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/bugsink
      # Unlike the dev compose file, this one assumes a reverse proxy/TLS
      # terminator in front (see the header comment above) — same
      # assumption as TRUSTED_PROXY_IPS for the backend itself.
      BEHIND_HTTPS_PROXY: "true"
      BASE_URL: ${BUGSINK_BASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import requests; requests.get('http://localhost:8000/health/ready').raise_for_status()\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M

  # One-shot seed — see docker-compose.yml's identical service.
  seed_bugsink_project:
    image: bugsink/bugsink:2
    profiles: ["monitoring"]
    env_file:
      - ./.env
    environment:
      SECRET_KEY: ${BUGSINK_SECRET_KEY}
      PORT: "8000"
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/bugsink
      BEHIND_HTTPS_PROXY: "true"
      BASE_URL: ${BUGSINK_BASE_URL}
    volumes:
      - ./docker/bugsink-seed/seed_default_project.py:/seed_default_project.py:ro
    command: sh -c "bugsink-manage shell < /seed_default_project.py"
    depends_on:
      bugsink:
        condition: service_healthy
    logging: *default-logging

volumes:
  postgres_data:
  qdrant_storage:
