# Serves the built React SPA. All non-file paths fall back to index.html so
# client-side routing (react-router) works on a hard refresh/deep link —
# without this, refreshing on e.g. /dashboard would 404 at the nginx level.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Security headers for the SPA itself — mirrors the reasoning in
    # backend/mystic_auth/auth/security/security_headers_middleware.py, scoped for an actual
    # HTML/JS/CSS document instead of a JSON-only API (which can use the far
    # stricter default-src 'none'). connect-src and frame-src are
    # intentionally left open to http(s): since the API origin is a
    # runtime-configurable env var (VITE_API_BASE_URL) baked in at build
    # time, not something this static config can know — tighten both to the
    # real API origin for a specific deployment. frame-src specifically
    # must not fall back to default-src 'self' (its default) — ManifestCV's
    # resume template preview (frontend/src/resumes/ResumeEditorPage.tsx)
    # embeds a PDF served by the backend, a different origin from this SPA,
    # in an <iframe>; without an explicit frame-src here that embed would
    # be silently blocked by this document's own CSP even though the
    # backend's response headers (security_headers_middleware.py) correctly
    # allow being framed by this origin. HSTS is deliberately NOT set here:
    # this container serves plain HTTP (see docs/deployment/guide.md — TLS
    # termination happens in front of it), and HSTS on a plain-HTTP
    # response has no effect; set it on whatever terminates TLS instead.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' http: https:; frame-src http: https:; frame-ancestors 'none'" always;

    # Vite content-hashes every built asset's filename (see frontend
    # architecture docs' "Build & bundling" — a changed file gets a new
    # name), so anything under /assets/ is safe to cache indefinitely: a
    # stale cached copy is never served under a stale name, and a real
    # content change always ships under a brand-new one. Without this,
    # every page load re-fetches every JS/CSS bundle from origin instead of
    # the browser serving them straight from cache on repeat visits.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # index.html itself must never be cached — it's the one file that
    # references the current build's hashed asset filenames, so serving a
    # stale cached copy would point the browser at asset filenames from a
    # previous deploy that may no longer exist on disk.
    location / {
        add_header Cache-Control "no-cache" always;
        try_files $uri $uri/ /index.html;
    }
}
