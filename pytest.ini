[pytest]
testpaths = tests/backend
python_files = test_*.py
python_classes = Test*
python_functions = test_*
; backend/ on sys.path (in addition to the repo root pytest already adds)
; so `app.*`/`mystic_auth.*` bare imports resolve exactly the way they do at
; runtime (uvicorn's WORKDIR is backend/, i.e. `/app` in Docker — see
; docker/backend.Dockerfile). This isn't just style: main.py and every
; ManifestCV route module cross the app/mystic_auth package boundary with
; bare imports (relative imports can't cross top-level packages), and if
; tests imported the same modules via `backend.mystic_auth.X` instead, the
; two prefixes would create two separate module objects — e.g. tests'
; `database`/`redis_client` singletons would silently diverge from the ones
; the running `app` actually uses. Bare imports here keep a single identity.
pythonpath = backend
addopts = -v --cov=backend/app --cov=backend/mystic_auth --cov-report=html
; --cov-fail-under is deliberately not set here: it would apply to every
; invocation, including partial local runs (e.g. `pytest tests/backend/unit`),
; which cover only a slice of backend/app and would false-fail well under any
; sensible whole-project threshold. CI enforces the threshold once, against
; cumulative unit+integration+security coverage — see ci.yml.